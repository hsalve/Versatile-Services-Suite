kind = "web"
previewPath = "/"
title = "Versatile Services HR & Payroll"
version = "1.0.0"
id = "artifacts/versatile-hr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20719

[services.development]
run = "pnpm --filter @workspace/versatile-hr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/versatile-hr", "run", "build" ]
publicDir = "artifacts/versatile-hr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20719"
BASE_PATH = "/"
